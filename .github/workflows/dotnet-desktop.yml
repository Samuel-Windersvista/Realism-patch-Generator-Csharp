name: .NET Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore RealismPatchGenerator.slnx

      - name: Build solution
        run: dotnet build RealismPatchGenerator.slnx --configuration Release --no-restore

      - name: Run test suite
        run: dotnet test RealismPatchGenerator.Tests/RealismPatchGenerator.Tests.csproj --configuration Release --no-build
